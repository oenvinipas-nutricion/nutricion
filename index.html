<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Control Total</title>
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
<style>
  body { font-family:-apple-system,BlinkMacSystemFont,sans-serif; padding:10px; background:#000; color:#eee; margin-bottom:90px; -webkit-tap-highlight-color: transparent; }
  .container{max-width:420px; margin:auto;}
  h2,h3{text-align:center;color:#fff; text-transform: uppercase; letter-spacing: 1px;}
  .subtitulo{text-align:center; color:#0a84ff; font-size:0.85em; margin-bottom:20px; font-weight:bold; text-transform: uppercase;}

  /* Paneles */
  .panel-card { background: #161618; border: 1px solid #2c2c2e; border-radius: 20px; padding: 20px 15px; margin-bottom: 25px; box-shadow: 0 8px 30px rgba(0,0,0,0.6); position: relative;}
  .panel-header { font-size: 0.85em; font-weight: 800; text-align: center; margin-bottom: 18px; text-transform: uppercase; color: #aaa; letter-spacing: 1.5px; }

  /* Registro Diario Estilo Sandwich (Foto 23614) */
  .input-row { display: flex; align-items: center; margin-bottom: 12px; gap: 10px; }
  .input-label-group { flex: 1.2; display: flex; align-items: center; gap: 5px; font-size: 0.75em; color: #aaa; font-weight: bold; }
  .input-box { background: #1c1c1e; border: 1px solid #333; border-radius: 12px; display: flex; align-items: center; justify-content: center; height: 52px; flex: 2; }
  .input-box input { background: transparent; border: none; color: #fff; font-size: 1.2em; font-weight: bold; text-align: center; width: 70px; outline: none; }
  .input-box .unidad { font-size: 0.75em; color: #8e8e93; font-weight: bold; flex: 0.5; text-align: right; padding-right: 10px; }

  /* Sugerencias (Foto 23551) */
  .guia-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
  .guia-item { background: #1c1c1e; border: 1px solid #333; border-radius: 15px; padding: 15px 5px; text-align: center; }
  .guia-lab { font-size: 0.55em; color: #8e8e93; display: block; font-weight: 800; margin-bottom: 4px; text-transform: uppercase;}
  .guia-val { font-size: 1.3em; font-weight: 900; }

  /* Tus Registros (Foto 23627) */
  .btn-editar-toggle { background: #1c1c1e; border: 1px solid #333; padding: 18px; border-radius: 15px; text-align: center; font-weight: bold; color: #0a84ff; cursor: pointer; text-transform: uppercase; font-size: 0.9em; letter-spacing: 1px; }
  .lista-scroll-hidden { display: none; margin-top: 15px; overflow-x: auto; gap: 12px; padding-bottom: 10px; scrollbar-width: none; transition: all 0.3s ease; }
  .log-card { background: #2c2c2e; border: 1px solid #444; border-radius: 15px; padding: 15px 20px; min-width: 120px; text-align: center; flex: 0 0 auto; cursor:pointer; font-weight: bold; }

  /* Modales y Seguridad */
  .modal-overlay { display:none; position:fixed; z-index:2000; left:0; top:0; width:100%; height:100%; background:rgba(0,0,0,0.95); backdrop-filter:blur(8px); }
  .modal-content { background:#161618; margin: 10% auto; padding:25px; border:1px solid #333; width:85%; border-radius:25px; color:white; position: relative; }
  .confirm-box { display:none; margin-top:20px; border-top:1px solid #333; padding-top:20px; text-align:center; }
  .btn-red { background: #ff453a; color: white; width: 100%; padding: 15px; border: none; border-radius: 12px; font-weight: bold; margin-top: 15px; cursor: pointer; }
  .btn-trash { position: absolute; top: 15px; right: 20px; font-size: 1.5em; cursor: pointer; color: #ff453a; }

  /* Círculos y Otros */
  .grid-circles{display:grid;grid-template-columns:repeat(3,1fr);gap:15px 5px; text-align: center;}
  .circle-container{position:relative;width:75px;height:75px;margin:auto;} 
  .circle-svg{transform:rotate(-90deg);width:100%;height:100%;}
  .circle-bg{fill:none;stroke:#1c1c1e;stroke-width:6;} 
  .circle-bar{fill:none;stroke-width:6;stroke-linecap:round;transition:stroke-dasharray 0.5s ease;}
  .circle-text{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:0.9em;font-weight:bold;}
  .nav-bar{position:fixed;bottom:0;left:0;right:0;background:rgba(15,15,15,0.95);display:flex;padding:12px 5px 30px;border-top:0.5px solid #333;}
  .nav-btn{background:none;border:none;color:#8e8e93;display:flex;flex-direction:column;align-items:center;font-size:0.7em;flex:1;}
  .nav-btn.active{color:#0a84ff;font-weight:bold;}
  .scroll-area { overflow-x: auto; }
  table { width: 100%; border-collapse: collapse; min-width: 450px; }
  th { background: #1c1c1e; padding: 10px; font-size: 0.6em; border-bottom: 2px solid #333; }
  td { padding: 12px 5px; border-bottom: 1px solid #222; text-align: center; font-weight: bold; font-size: 0.9em; }
  td:first-child { color: #0a84ff; text-align: left; }
</style>
</head>
<body onload="cargarTodo()">

<div class="container">
  <div id="page-perfil" class="page active-page">
    <h2 style="margin-top:80px;">Control Total</h2>
    <input type="text" id="inputNombre" style="background:#1c1c1e; border:1px solid #333; color:#fff; padding:18px; border-radius:12px; width:100%; text-align:center; font-size:1.2em; font-weight:bold; margin-bottom:20px;" placeholder="TU NOMBRE">
    <button style="background: #1c3d99; color: white; width: 100%; padding: 18px; border: none; border-radius: 12px; font-weight: bold; cursor: pointer;" onclick="ingresarUsuario()">🚀 ENTRAR</button>
  </div>

  <div id="page-hoy" class="page">
    <h2 id="saludoHoy">HOLA</h2>
    <p class="subtitulo" id="fechaHoy"></p>
    
    <div class="panel-card" id="guiaDinamica" style="display:none;">
      <div class="panel-header" id="tituloSugerencia" style="color:#0a84ff;"></div>
      <div id="guiaValores" class="guia-grid"></div>
    </div>
    
    <div class="panel-card">
      <div class="panel-header">✍️ REGISTRO DIARIO</div>
      <select id="tipoComida" style="background:#1c1c1e; border:1px solid #333; color:#fff; padding:15px; border-radius:12px; width:100%; margin-bottom:15px; text-align-last:center; font-weight:bold;" onchange="verificarSoloAgua()"></select>
      
      <div class="input-row" id="row-kcal"><div class="input-label-group">KCal 🔥</div><div class="input-box"><input type="number" id="kcal"><span class="unidad">kcal</span></div></div>
      <div class="input-row" id="row-prot"><div class="input-label-group">Prot 💪</div><div class="input-box"><input type="number" id="prot"><span class="unidad">g</span></div></div>
      <div class="input-row" id="row-carbs"><div class="input-label-group">Carb 🍞</div><div class="input-box"><input type="number" id="carbs"><span class="unidad">g</span></div></div>
      <div class="input-row" id="row-grasas"><div class="input-label-group">Gras 🥑</div><div class="input-box"><input type="number" id="grasas"><span class="unidad">g</span></div></div>
      <div class="input-row" id="row-fibra"><div class="input-label-group">Fibr 🌿</div><div class="input-box"><input type="number" id="fibra"><span class="unidad">g</span></div></div>
      <div class="input-row" id="row-agua"><div class="input-label-group">Agua 💧</div><div class="input-box"><input type="number" id="agua"><span class="unidad">ml</span></div></div>
      
      <button style="background: #1c3d99; color: white; width: 100%; padding: 18px; border: none; border-radius: 12px; font-weight: bold; font-size: 1.1em; margin-top: 10px; cursor: pointer;" onclick="registrarComida()">+ REGISTRAR</button>
    </div>
    
    <div class="panel-card" style="background: radial-gradient(circle at top, #1e1e24 0%, #111 80%);"><div class="panel-header" style="color:#32d74b;">📊 TU PROGRESO</div><div class="grid-circles" id="circulosHoy"></div></div>
    
    <div class="panel-card">
      <div class="panel-header">📋 TUS REGISTROS</div>
      <div class="btn-editar-toggle" onclick="toggleEditList()">EDITAR</div>
      <div id="listaComidasHoy" class="lista-scroll-hidden"></div>
    </div>
    
    <button style="background: #248a3d; color: white; width: 100%; padding: 18px; border: none; border-radius: 12px; font-weight: bold;" onclick="cerrarDia()">💾 FINALIZAR DÍA</button>
  </div>

  <div id="page-semanal" class="page"><h2>Reporte Semanal</h2><p class="subtitulo" id="rangoSemanaTexto"></p><div class="panel-card"><div class="grid-circles" id="circulosSemanal"></div></div></div>
  <div id="page-mensual" class="page"><h2>Reporte Mensual</h2><p class="subtitulo" id="rangoMesTexto"></p><div class="panel-card"><div class="grid-circles" id="circulosMensual"></div></div></div>
  <div id="page-historial" class="page"><h2>Historial Diario</h2><div class="panel-card"><div class="scroll-area"><table><thead><tr id="historialHeader"></tr></thead><tbody id="tablaHistorial"></tbody></table></div></div></div>
  
  <div id="page-config" class="page">
    <h2>Metas</h2>
    <div class="panel-card">
      <div class="input-row"><div class="input-label-group">KCal 🔥</div><div class="input-box"><input type="number" id="mKcal"></div></div>
      <div class="input-row"><div class="input-label-group">Prot 💪</div><div class="input-box"><input type="number" id="mProt"></div></div>
      <div class="input-row"><div class="input-label-group">Carb 🍞</div><div class="input-box"><input type="number" id="mCarbs"></div></div>
      <div class="input-row"><div class="input-label-group">Gras 🥑</div><div class="input-box"><input type="number" id="mGrasas"></div></div>
      <div class="input-row"><div class="input-label-group">Fibr 🌿</div><div class="input-box"><input type="number" id="mFibra"></div></div>
      <div class="input-row"><div class="input-label-group">Agua 💧</div><div class="input-box"><input type="number" id="mAgua"></div></div>
      <button style="background: #248a3d; color: white; width: 100%; padding: 15px; border: none; border-radius: 12px; font-weight: bold; margin-top: 10px;" onclick="guardarMetas()">💾 GUARDAR METAS</button>
    </div>
    <button style="background: #444; color: white; width: 100%; padding: 12px; border: none; border-radius: 10px; margin-top: 20px;" onclick="cambiarPerfil()">Cerrar Sesión</button>
  </div>
</div>

<div id="modalDetalle" class="modal-overlay">
  <div class="modal-content">
    <div class="btn-trash" id="btnTrashIcon">🗑️</div>
    <h3 id="detalleTitulo" style="color:#0a84ff; text-align:left; margin-bottom:20px;">Editar</h3>
    <div id="detalleContenido"></div>
    <button style="background: #248a3d; color: white; width: 100%; padding: 16px; border: none; border-radius: 12px; font-weight: bold; margin-top: 20px;" id="btnUpdateData">✅ ACTUALIZAR DATOS</button>
    <button style="background: #444; color: white; width: 100%; padding: 14px; border: none; border-radius: 12px; margin-top: 10px;" onclick="cerrarDetalle()">↩️ VOLVER</button>

    <div id="confirmArea" class="confirm-box">
      <h3 style="color:#ff453a;">¿ESTÁS SEGURO?</h3>
      <button class="btn-red" id="confirmAction">SÍ, CONTINUAR</button>
    </div>
  </div>
</div>

<div id="miModalResumen" class="modal-overlay"><div class="modal-content"><h3>📊 Resumen Diario</h3><div id="modalTexto" style="text-align:left; font-size:0.9em;"></div><button style="background: #1c3d99; color: white; width: 100%; padding: 15px; border: none; border-radius: 12px; margin-top: 15px;" onclick="cerrarModal()">ACEPTAR</button></div></div>

<div class="nav-bar" id="main-nav" style="display:none;">
  <button class="nav-btn active" onclick="verPagina('hoy', this)"><span>📝</span>Hoy</button>
  <button class="nav-btn" onclick="verPagina('semanal', this)"><span>📊</span>Semana</button>
  <button class="nav-btn" onclick="verPagina('mensual', this)"><span>📆</span>Mes</button>
  <button class="nav-btn" onclick="verPagina('historial', this)"><span>📚</span>Historial</button>
  <button class="nav-btn" onclick="verPagina('config', this)"><span>⚙️</span>Metas</button>
</div>

<script>
let perfiles = {}, usuarioActual = null, callbackConfirm = null;
const COLORES = { kcal:'#ff453a', prot:'#0a84ff', carbs:'#ff9f0a', grasas:'#32d74b', fibra:'#bf5af2', agua:'#00bfff' };
const ICONOS = { kcal:'🔥', prot:'💪', carbs:'🍞', grasas:'🥑', fibra:'🌿', agua:'💧' };
const NOMBRES = { kcal:'CALORÍAS', prot:'PROTEÍNA', carbs:'CARBOIDRATOS', grasas:'GRASAS', fibra:'FIBRA', agua:'AGUA' };

function cargarTodo(){
  let d = localStorage.getItem('nutriDataV6'); if(d) perfiles = JSON.parse(d);
  let u = localStorage.getItem('nutriUsuarioActivo'); if(u && perfiles[u]) seleccionarPerfil(u);
}
function ingresarUsuario(){
  let n = document.getElementById('inputNombre').value.trim(); if(!n) return;
  n = n.charAt(0).toUpperCase() + n.slice(1).toLowerCase();
  if(!perfiles[n]) perfiles[n] = { METAS:{kcal:1800,prot:110,carbs:200,grasas:60,fibra:45,agua:2500}, hoy:[], historial:[] };
  seleccionarPerfil(n);
}
function seleccionarPerfil(n){
  usuarioActual = n; localStorage.setItem('nutriUsuarioActivo', n);
  document.getElementById('saludoHoy').innerText = "¡HOLA, " + n + "!";
  actualizarFechas();
  document.getElementById('page-perfil').classList.remove('active-page');
  document.getElementById('page-hoy').classList.add('active-page');
  document.getElementById('main-nav').style.display = 'flex';
  actualizarDropdown(); actualizarUI();
}
function actualizarFechas(){
  const f = new Date(), dias = ['DOMINGO','LUNES','MARTES','MIÉRCOLES','JUEVES','VIERNES','SÁBADO'], meses = ['ENERO','FEBRERO','MARZO','ABRIL','MAYO','JUNIO','JULIO','AGOSTO','SEPTIEMBRE','OCTUBRE','NOVIEMBRE','DICIEMBRE'];
  document.getElementById('fechaHoy').innerText = `${dias[f.getDay()]} ${f.getDate()} DE ${meses[f.getMonth()]}`;
  let hoy = new Date(), lun = new Date(hoy.setDate(hoy.getDate()-hoy.getDay()+(hoy.getDay()===0?-6:1))), dom = new Date(lun); dom.setDate(lun.getDate()+6);
  document.getElementById('rangoSemanaTexto').innerText = `DESDE EL LUNES ${lun.getDate()}/${lun.getMonth()+1} HASTA EL DOMINGO ${dom.getDate()}/${dom.getMonth()+1}`;
  document.getElementById('rangoMesTexto').innerText = meses[new Date().getMonth()] + " " + new Date().getFullYear();
}
function toggleEditList(){
  const list = document.getElementById('listaComidasHoy');
  list.style.display = (list.style.display === 'flex') ? 'none' : 'flex';
}
function verificarSoloAgua(){
  let es = document.getElementById('tipoComida').value === "💧 Solo Agua";
  ['kcal','prot','carbs','grasas','fibra'].forEach(id=>{
    let r = document.getElementById('row-'+id); if(r) r.style.opacity = es ? '0.2' : '1';
    let i = document.getElementById(id); if(i) i.disabled = es;
  });
}
function registrarComida(){
  let s = document.getElementById('tipoComida').value, p = perfiles[usuarioActual];
  p.hoy.push({id:Date.now(), tipo:s, kcal:+document.getElementById('kcal').value||0, prot:+document.getElementById('prot').value||0, carbs:+document.getElementById('carbs').value||0, grasas:+document.getElementById('grasas').value||0, fibra:+document.getElementById('fibra').value||0, agua:+document.getElementById('agua').value||0});
  ['kcal','prot','carbs','grasas','fibra','agua'].forEach(id=>document.getElementById(id).value='');
  guardarYActualizar(); actualizarDropdown();
}
function guardarYActualizar(){ localStorage.setItem('nutriDataV6', JSON.stringify(perfiles)); actualizarUI(); }
function obtenerTotales(l){ return l.reduce((a,c)=>({kcal:a.kcal+(c.kcal||0),prot:a.prot+(c.prot||0),carbs:a.carbs+(c.carbs||0),grasas:a.grasas+(c.grasas||0),fibra:a.fibra+(c.fibra||0),agua:a.agua+(c.agua||0)}),{kcal:0,prot:0,carbs:0,grasas:0,fibra:0,agua:0}); }
function renderCircle(k, a, m){
  let p = (m>0)? Math.min((a/m)*100,100) : 0, d = p*2.15, r = m-a;
  return `<div><div class="circle-container"><svg class="circle-svg" viewBox="0 0 80 80"><circle class="circle-bg" cx="40" cy="40" r="35"/><circle class="circle-bar" cx="40" cy="40" r="35" style="stroke:${COLORES[k]};stroke-dasharray:${d} 220"/></svg><div class="circle-text" style="color:${COLORES[k]}">${Math.round(p)}%</div></div><div style="font-size:0.55em;font-weight:bold;margin-top:5px;color:#aaa">${ICONOS[k]} ${k.toUpperCase()}</div><div style="font-size:0.65em;color:#888">${m==0?'-':(r>0?'Faltan '+Math.round(r):'¡Límite!')}</div></div>`;
}
function actualizarUI(){
  let p = perfiles[usuarioActual], t = obtenerTotales(p.hoy);
  document.getElementById('circulosHoy').innerHTML = Object.keys(p.METAS).map(k=> renderCircle(k, t[k], p.METAS[k])).join('');
  document.getElementById('listaComidasHoy').innerHTML = p.hoy.map(c=> `<div class="log-card" onclick="abrirDetalle(${c.id})">${c.tipo}</div>`).join('') || `<p style="text-align:center;width:100%;color:#666">VACÍO</p>`;
  actualizarGuia(p.hoy, p.METAS, t);
}
function actualizarGuia(h, m, t){
  let pen = ["🍳 Desayuno", "Almuerzo", "🍽️ Cena"].filter(c=> !h.map(x=>x.tipo).includes(c));
  if(!pen.length){ document.getElementById('guiaDinamica').style.display='none'; return; }
  document.getElementById('guiaDinamica').style.display='block';
  document.getElementById('tituloSugerencia').innerText = `💡 SUGERENCIA PARA: ${pen[0].toUpperCase()}`;
  document.getElementById('guiaValores').innerHTML = Object.keys(m).map(k=> {
    let r = Math.max(0, (m[k]||0)-t[k]), sug = Math.round(r/pen.length);
    return `<div class="guia-item"><span class="guia-lab">${ICONOS[k]} ${k}</span><span class="guia-val" style="color:${COLORES[k]}">${sug}${k==='agua'?'ml':'g'}</span></div>`;
  }).join('');
}
function abrirDetalle(id){
  let c = perfiles[usuarioActual].hoy.find(x=>x.id===id);
  document.getElementById('detalleTitulo').innerText = "EDITAR " + c.tipo;
  document.getElementById('detalleContenido').innerHTML = Object.keys(COLORES).map(k=> `
    <div class="input-row"><div class="input-label-group">${NOMBRES[k]} ${ICONOS[k]}</div><div class="input-box"><input type="number" id="edit-${k}" value="${c[k]}"><span class="unidad">${k==='agua'?'ml':'g'}</span></div></div>
  `).join('');
  document.getElementById('confirmArea').style.display = 'none';
  document.getElementById('btnTrashIcon').onclick = () => { document.getElementById('confirmArea').style.display = 'block'; callbackConfirm = () => { perfiles[usuarioActual].hoy = perfiles[usuarioActual].hoy.filter(x=>x.id!==id); cerrarDetalle(); guardarYActualizar(); actualizarDropdown(); }; };
  document.getElementById('btnUpdateData').onclick = () => { document.getElementById('confirmArea').style.display = 'block'; callbackConfirm = () => { Object.keys(COLORES).forEach(k=> c[k] = +document.getElementById('edit-'+k).value || 0); cerrarDetalle(); guardarYActualizar(); }; };
  document.getElementById('modalDetalle').style.display='block';
}
document.getElementById('confirmAction').onclick = () => { if(callbackConfirm) callbackConfirm(); };
function verPagina(id, b){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active-page'));
  document.getElementById('page-'+id).classList.add('active-page');
  document.querySelectorAll('.nav-btn').forEach(btn=>btn.classList.remove('active'));
  b.classList.add('active');
  if(id==='historial') renderHistorial();
  if(id==='semanal' || id==='mensual') renderReporte(id);
  if(id==='config') cargarMetasInputs();
}
function renderReporte(tipo){
  let p = perfiles[usuarioActual], d = tipo==='semanal'?7:30, h = p.historial.slice(0, d), tot = obtenerTotales(h);
  document.getElementById('circulos'+tipo.charAt(0).toUpperCase()+tipo.slice(1)).innerHTML = Object.keys(p.METAS).map(k=> renderCircle(k, tot[k], (p.METAS[k]||0)*d)).join('');
}
function renderHistorial(){
  let p = perfiles[usuarioActual], m = p.METAS, f = new Date(), dias = ['D','L','M','X','J','V','S'];
  document.getElementById('historialHeader').innerHTML = `<th>FECHA</th>` + Object.keys(m).map(k=> `<th>${ICONOS[k]} ${k.toUpperCase()}<span class="m-val">${m[k]}</span></th>`).join('');
  document.getElementById('tablaHistorial').innerHTML = p.historial.map(h=> `<tr><td>${h.f || ''}</td><td>${h.kcal}</td><td>${h.prot}</td><td>${h.carbs}</td><td>${h.grasas}</td><td>${h.fibra}</td><td>${h.agua}</td></tr>`).join('');
}
function cerrarDia(){
  let p = perfiles[usuarioActual], t = obtenerTotales(p.hoy);
  const f = new Date(), dias = ['D','L','M','X','J','V','S'];
  t.f = `${dias[f.getDay()]} ${f.getDate()}/${f.getMonth()+1}`;
  p.historial.unshift(t); p.hoy = []; guardarYActualizar(); confetti(); 
  document.getElementById('modalTexto').innerHTML = Object.keys(p.METAS).map(k=> `• ${ICONOS[k]} ${NOMBRES[k]}: ${Math.round(t[k])} / ${p.METAS[k]}<br>`).join('');
  document.getElementById('miModalResumen').style.display='block';
}
function actualizarDropdown(){ let h = perfiles[usuarioActual].hoy.map(c=>c.tipo), s = document.getElementById('tipoComida'); s.innerHTML = ["🍳 Desayuno", "🍎 Colación AM", "Almuerzo", "🥪 Colación PM", "🍽️ Cena", "💧 Solo Agua"].filter(c=> !h.includes(c) || c==="💧 Solo Agua").map(c=>`<option value="${c}">${c}</option>`).join(''); verificarSoloAgua(); }
function cerrarDetalle(){ document.getElementById('modalDetalle').style.display='none'; }
function cerrarModal(){ document.getElementById('miModalResumen').style.display='none'; }
function cargarMetasInputs(){ let m = perfiles[usuarioActual].METAS; for(let k in m) document.getElementById('m'+k.charAt(0).toUpperCase()+k.slice(1)).value = m[k]; }
