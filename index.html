<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Control Total</title>
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
<style>
  body { font-family:-apple-system,BlinkMacSystemFont,sans-serif; padding:10px; background:#000; color:#eee; margin-bottom:90px; -webkit-tap-highlight-color: transparent; }
  .container{max-width:420px; margin:auto;}
  h2,h3{text-align:center;color:#fff; text-transform: uppercase; letter-spacing: 1px;}
  .subtitulo{text-align:center; color:#0a84ff; font-size:0.85em; margin-bottom:20px; font-weight:bold; text-transform: uppercase;}
  .page{display:none;} .active-page{display:block;}
  .nav-bar{position:fixed;bottom:0;left:0;right:0;background:rgba(15,15,15,0.95);backdrop-filter:blur(15px);display:flex;padding:12px 5px 30px 5px;border-top:0.5px solid #333;z-index:1000;}
  .nav-btn{background:none;border:none;color:#8e8e93;display:flex;flex-direction:column;align-items:center;font-size:0.7em;flex:1;}
  .nav-btn.active{color:#0a84ff;font-weight:bold;}
  
  .panel-card { background: linear-gradient(145deg, #161618 0%, #0f0f11 100%); border: 1px solid #2c2c2e; border-radius: 20px; padding: 20px 15px; margin-bottom: 25px; box-shadow: 0 8px 30px rgba(0,0,0,0.6); position: relative;}
  .panel-luminoso { background: radial-gradient(circle at top, #1e1e24 0%, #111 80%); border: 1px solid #333; }
  .panel-header { font-size: 0.85em; font-weight: 800; text-align: center; margin-bottom: 18px; text-transform: uppercase; letter-spacing: 1.5px; }
  
  /* INPUTS CON ETIQUETA A LA IZQUIERDA */
  .meta-row { display: flex; align-items: center; margin-bottom: 10px; gap: 10px; }
  .meta-label { flex: 1; font-size: 0.85em; color: #aaa; font-weight: bold; text-transform: uppercase; }

  .input-grid { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
  .input-box { background: #111; border: 1px solid #333; border-radius: 12px; display: flex; align-items: center; justify-content: center; height: 50px; flex: 2; }
  .input-box input { background: transparent; border: none; color: #fff; font-size: 1.1em; font-weight: bold; text-align: center; width: 60px; outline: none; }
  .input-box .icono { font-size: 1.1em; margin-right: 4px; }
  .input-box .unidad { font-size: 0.75em; color: #8e8e93; font-weight: bold; }
  
  /* TABLA HISTORIAL TIPO CARTEL */
  .scroll-area { overflow-x: auto; margin-top: 10px; }
  table { width: 100%; border-collapse: collapse; min-width: 380px; }
  th { background: #1c1c1e; padding: 10px 2px; color: #eee; border-bottom: 2px solid #333; font-size: 0.65em; vertical-align: middle; line-height: 1.2; }
  th .m-val { display: block; color: #0a84ff; font-size: 1.1em; font-weight: 800; margin-top: 2px; }
  td { padding: 12px 2px; border-bottom: 1px solid #222; color: #fff; text-align: center; font-weight: bold; font-size: 0.9em; }
  td:first-child { color: #0a84ff; text-align: left; padding-left: 5px; font-size: 0.85em; }

  .btn-trash { position: absolute; top: 15px; right: 15px; background: rgba(255, 69, 58, 0.1); border: 1px solid #ff453a; border-radius: 50%; width: 42px; height: 42px; display: flex; align-items: center; justify-content: center; font-size: 1.3em; color: #ff453a; cursor:pointer;}
  .btn-blue, .btn-green, .btn-white { width: 100%; border: none; border-radius: 12px; font-weight: bold; text-transform: uppercase; cursor: pointer; padding: 16px; }
  .btn-blue { background: linear-gradient(145deg, #1c3d99, #0a84ff); color: white; }
  .btn-green { background: linear-gradient(145deg, #248a3d, #32d74b); color: white; }
  .btn-white { background: #fff; color: #000; margin-top: 10px; }

  .lista-horizontal-scroll { display: flex; overflow-x: auto; gap: 12px; padding-bottom: 10px; scrollbar-width: none; }
  .log-card { background: #1c1c1e; border: 1px solid #333; border-radius: 15px; padding: 15px; min-width: 110px; text-align: center; flex: 0 0 auto; cursor:pointer;}
  .modal-overlay { display:none; position:fixed; z-index:2000; left:0; top:0; width:100%; height:100%; background:rgba(0,0,0,0.9); backdrop-filter:blur(8px); }
  .modal-content { background:#161618; margin: 10% auto; padding:25px; border:1px solid #333; width:85%; border-radius:25px; color:white; position: relative; }
  .grid-circles{display:grid;grid-template-columns:repeat(3,1fr);gap:15px 5px; text-align:center;}
  .circle-container{position:relative;width:75px;height:75px;margin:auto;} 
  .circle-svg{transform:rotate(-90deg);width:100%;height:100%;}
  .circle-bg{fill:none;stroke:#1c1c1e;stroke-width:6;} 
  .circle-bar{fill:none;stroke-width:6;stroke-linecap:round;transition:stroke-dasharray 0.5s ease;}
  .circle-text{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:0.9em;font-weight:bold;} 
</style>
</head>
<body onload="cargarTodo()">
<audio id="sonidoAplausos" src="https://assets.mixkit.co/active_storage/sfx/2013/2013-preview.mp3" crossorigin="anonymous"></audio>

<div class="container">
  <div id="page-perfil" class="page active-page">
    <h2 style="margin-top:60px;">Control Total</h2>
    <input type="text" id="inputNombre" style="background:#111; border:1px solid #333; color:#fff; padding:15px; border-radius:12px; width:100%; text-align:center; font-weight:bold; margin-bottom:15px;" placeholder="Tu nombre">
    <button class="btn-blue" onclick="ingresarUsuario()">🚀 Entrar</button>
  </div>

  <div id="page-hoy" class="page">
    <h2 id="saludoHoy">¡Hola!</h2><p class="subtitulo" id="fechaHoy"></p>
    <div class="panel-card" id="guiaDinamica" style="display:none;"><div class="panel-header" style="color:#0a84ff;">💡 SUGERENCIA</div><div id="guiaValores" class="input-grid"></div></div>
    
    <div class="panel-card">
      <div class="panel-header">✍️ REGISTRO DIARIO</div>
      <select id="tipoComida" style="background:#111; border:1px solid #333; color:#fff; padding:12px; border-radius:12px; width:100%; margin-bottom:15px; text-align-last:center; font-weight:bold;" onchange="verificarSoloAgua()"></select>
      <div class="input-grid">
        <div class="input-box" id="box-kcal"><span class="icono">🔥</span><input type="number" id="kcal" onkeydown="saltarEnter(event,'prot')"><span class="unidad">kcal</span></div>
        <div class="input-box" id="box-prot"><span class="icono">💪</span><input type="number" id="prot" onkeydown="saltarEnter(event,'carbs')"><span class="unidad">g</span></div>
        <div class="input-box" id="box-carbs"><span class="icono">🍞</span><input type="number" id="carbs" onkeydown="saltarEnter(event,'grasas')"><span class="unidad">g</span></div>
        <div class="input-box" id="box-grasas"><span class="icono">🥑</span><input type="number" id="grasas" onkeydown="saltarEnter(event,'fibra')"><span class="unidad">g</span></div>
        <div class="input-box" id="box-fibra"><span class="icono">🌿</span><input type="number" id="fibra" onkeydown="saltarEnter(event,'agua')"><span class="unidad">g</span></div>
        <div class="input-box" id="box-agua"><span class="icono">💧</span><input type="number" id="agua" onkeydown="saltarEnter(event,'btnRegistrar')"><span class="unidad">ml</span></div>
      </div>
      <button class="btn-blue" id="btnRegistrar" style="margin-top:15px;" onclick="registrarComida()">GUARDAR</button>
    </div>
    
    <div class="panel-card panel-luminoso"><div class="panel-header" style="color:#32d74b;">📊 PROGRESO DE HOY</div><div class="grid-circles" id="circulosHoy"></div></div>
    <div class="panel-card"><div class="panel-header" style="color:#aaa;">📋 TUS REGISTROS</div><div id="listaComidasHoy"></div></div>
    <button class="btn-green" onclick="cerrarDia()">💾 FINALIZAR DÍA</button>
  </div>

  <div id="page-semanal" class="page"><h2>Reporte Semanal</h2><p class="subtitulo" id="rangoSemanaTexto"></p><div class="panel-card panel-luminoso"><div class="grid-circles" id="circulosSemanal"></div></div><button class="btn-white" onclick="window.print()">📄 PDF SEMANAL</button></div>
  <div id="page-mensual" class="page"><h2>Reporte Mensual</h2><p class="subtitulo" id="rangoMesTexto"></p><div class="panel-card panel-luminoso"><div class="grid-circles" id="circulosMensual"></div></div><button class="btn-white" onclick="window.print()">📄 PDF MENSUAL</button></div>
  
  <div id="page-historial" class="page">
    <h2>Historial Diario</h2>
    <div class="panel-card">
        <div class="scroll-area"><table><thead><tr id="historialHeader"></tr></thead><tbody id="tablaHistorial"></tbody></table></div>
    </div>
    <button class="btn-white" onclick="window.print()">📄 PDF HISTORIAL</button>
  </div>
  
  <div id="page-config" class="page">
    <h2>Configurar Metas</h2>
    <div class="panel-card">
      <div class="meta-row"><span class="meta-label">🔥 Calorías</span><div class="input-box"><input type="number" id="mKcal"><span class="unidad">kcal</span></div></div>
      <div class="meta-row"><span class="meta-label">💪 Proteína</span><div class="input-box"><input type="number" id="mProt"><span class="unidad">g</span></div></div>
      <div class="meta-row"><span class="meta-label">🍞 Carbos</span><div class="input-box"><input type="number" id="mCarbs"><span class="unidad">g</span></div></div>
      <div class="meta-row"><span class="meta-label">🥑 Grasas</span><div class="input-box"><input type="number" id="mGrasas"><span class="unidad">g</span></div></div>
      <div class="meta-row"><span class="meta-label">🌿 Fibra</span><div class="input-box"><input type="number" id="mFibra"><span class="unidad">g</span></div></div>
      <div class="meta-row"><span class="meta-label">💧 Agua</span><div class="input-box"><input type="number" id="mAgua"><span class="unidad">ml</span></div></div>
      <button class="btn-green" style="margin-top:15px;" onclick="guardarMetas()">💾 GUARDAR METAS</button>
    </div>
    <button class="btn-blue" style="background:#333;margin-top:20px;" onclick="cambiarPerfil()">Cerrar Sesión</button>
  </div>
</div>

<div id="modalDetalle" class="modal-overlay"><div class="modal-content"><div class="btn-trash" id="btnBorrarDetalle">🗑️</div><h3 id="detalleTitulo" style="color:#0a84ff; text-align:left;">Editar</h3><div id="detalleContenido" class="input-grid"></div><button class="btn-green" style="margin-top:20px;" id="btnActualizar">✅ ACTUALIZAR</button><button class="btn-white" onclick="cerrarDetalle()">↩️ VOLVER</button></div></div>
<div id="modalConfirm" class="modal-overlay"><div class="modal-content" style="text-align:center;"><h3 style="color:#ff453a;">¿Seguro?</h3><p id="confirmTexto"></p><button class="btn-blue" style="background:#ff453a; margin-bottom:10px;" id="confirmSi">SÍ, CONTINUAR</button><button class="btn-white" onclick="cerrarConfirm()">CANCELAR</button></div></div>
<div id="miModalResumen" class="modal-overlay"><div class="modal-content"><h3>📊 Resumen</h3><div id="modalTexto"></div><button class="btn-blue" style="margin-top:15px" onclick="cerrarModal()">Aceptar</button></div></div>

<div class="nav-bar" id="main-nav" style="display:none;">
  <button class="nav-btn active" onclick="verPagina('hoy', this)"><span>📝</span>Hoy</button><button class="nav-btn" onclick="verPagina('semanal', this)"><span>📊</span>Semana</button><button class="nav-btn" onclick="verPagina('mensual', this)"><span>📆</span>Mes</button><button class="nav-btn" onclick="verPagina('historial', this)"><span>📚</span>Historial</button><button class="nav-btn" onclick="verPagina('config', this)"><span>⚙️</span>Metas</button>
</div>

<script>
let perfiles = {}, usuarioActual = null, callbackConfirm = null;
const COLORES = { kcal:'#ff453a', prot:'#0a84ff', carbs:'#ff9f0a', grasas:'#32d74b', fibra:'#bf5af2', agua:'#00bfff' };
const ICONOS = { kcal:'🔥', prot:'💪', carbs:'🍞', grasas:'🥑', fibra:'🌿', agua:'💧' };
const NOMBRES = { kcal:'Calorías', prot:'Proteína', carbs:'Carbos', grasas:'Grasas', fibra:'Fibra', agua:'Agua' };

function cargarTodo(){
  let d = localStorage.getItem('nutriDataV6'); if(d) perfiles = JSON.parse(d);
  let u = localStorage.getItem('nutriUsuarioActivo'); if(u && perfiles[u]) seleccionarPerfil(u);
}
function ingresarUsuario(){
  let n = document.getElementById('inputNombre').value.trim(); if(!n) return;
  n = n.charAt(0).toUpperCase() + n.slice(1).toLowerCase();
  if(!perfiles[n]) perfiles[n] = { METAS:{kcal:'',prot:'',carbs:'',grasas:'',fibra:'',agua:''}, hoy:[], historial:[] };
  seleccionarPerfil(n);
}
function seleccionarPerfil(n){
  usuarioActual = n; localStorage.setItem('nutriUsuarioActivo', n);
  document.getElementById('saludoHoy').innerText = "¡Hola, " + n + "!";
  document.getElementById('fechaHoy').innerText = getFechaConDia(new Date());
  document.getElementById('page-perfil').classList.remove('active-page');
  document.getElementById('page-hoy').classList.add('active-page');
  document.getElementById('main-nav').style.display = 'flex';
  actualizarDropdown(); actualizarUI();
}
function getFechaConDia(f){ 
  const dias = ['D','L','M','X','J','V','S']; 
  return `${dias[f.getDay()]} ${f.getDate().toString().padStart(2,'0')}/${(f.getMonth()+1).toString().padStart(2,'0')}`;
}
function verificarSoloAgua(){
  let es = document.getElementById('tipoComida').value === "💧 Solo Agua";
  ['kcal','prot','carbs','grasas','fibra'].forEach(id=>{
    let i = document.getElementById(id); if(i){ i.disabled = es; if(es) i.value=''; document.getElementById('box-'+id).style.opacity = es ? '0.3' : '1'; }
  });
}
function registrarComida(){
  let s = document.getElementById('tipoComida').value, a = +document.getElementById('agua').value || 0, p = perfiles[usuarioActual];
  if(s === "💧 Solo Agua"){
    let ex = p.hoy.find(c=>c.tipo === "💧 Solo Agua");
    if(ex) ex.agua += a; else p.hoy.push({id:Date.now(),tipo:s,kcal:0,prot:0,carbs:0,grasas:0,fibra:0,agua:a});
  } else {
    p.hoy.push({id:Date.now(),tipo:s,kcal:+document.getElementById('kcal').value||0,prot:+document.getElementById('prot').value||0,carbs:+document.getElementById('carbs').value||0,grasas:+document.getElementById('grasas').value||0,fibra:+document.getElementById('fibra').value||0,agua:a});
  }
  ['kcal','prot','carbs','grasas','fibra','agua'].forEach(id=>document.getElementById(id).value='');
  guardarYActualizar(); actualizarDropdown();
}
function guardarYActualizar(){ localStorage.setItem('nutriDataV6', JSON.stringify(perfiles)); actualizarUI(); }
function obtenerTotales(l){ return l.reduce((a,c)=>({kcal:a.kcal+(c.kcal||0),prot:a.prot+(c.prot||0),carbs:a.carbs+(c.carbs||0),grasas:a.grasas+(c.grasas||0),fibra:a.fibra+(c.fibra||0),agua:a.agua+(c.agua||0)}),{kcal:0,prot:0,carbs:0,grasas:0,fibra:0,agua:0}); }
function renderCircle(k, a, m){
  let p = (m>0)? Math.min((a/m)*100,100) : 0, d = p*2.1, u = k==='agua'?'ml':k==='kcal'?'kcal':'g', r = m-a;
  let txt = (m==='' || m==0)?'-' : (r>0?`Faltan ${Math.round(r)}${u}` : `<span style="color:#ff453a;">+${Math.abs(Math.round(r))}${u}</span>`);
  return `<div class="circle-wrapper"><div class="circle-container"><svg class="circle-svg" viewBox="0 0 80 80"><circle class="circle-bg" cx="40" cy="40" r="35"/><circle class="circle-bar" cx="40" cy="40" r="35" style="stroke:${COLORES[k]};stroke-dasharray:${d} 220;transition:0.5s"/></svg><div class="circle-text" style="color:${COLORES[k]}">${Math.round(p)}%</div></div><div style="font-size:0.55em;font-weight:bold;margin-top:5px;color:#aaa">${ICONOS[k]} ${k.toUpperCase()}</div><div style="font-size:0.6em;color:#888">${txt}</div></div>`;
}
function actualizarUI(){
  let p = perfiles[usuarioActual], t = obtenerTotales(p.hoy);
  document.getElementById('circulosHoy').innerHTML = Object.keys(p.METAS).map(k=> renderCircle(k, t[k], p.METAS[k])).join('');
  document.getElementById('listaComidasHoy').innerHTML = p.hoy.length ? `<div class="lista-horizontal-scroll">`+p.hoy.map(c=> `<div class="log-card" onclick="abrirDetalle(${c.id})"><div style="font-size:0.7em;color:#aaa">${c.tipo}</div><div style="font-weight:bold;color:${c.tipo.includes('Agua')?'#00bfff':'#ff453a'}">${c.tipo.includes('Agua')?c.agua+'ml':c.kcal+'kcal'}</div></div>`).join('')+`</div>` : `<p style="text-align:center;color:#666;font-size:0.8em;">Vacío</p>`;
}
function abrirDetalle(id){
  let c = perfiles[usuarioActual].hoy.find(x=>x.id===id);
  document.getElementById('detalleTitulo').innerText = "Editar " + c.tipo;
  document.getElementById('detalleContenido').innerHTML = Object.keys(COLORES).map(k=> `<div class="input-box"><span class="icono">${ICONOS[k]}</span><input type="number" id="edit-${k}" value="${c[k]}"><span class="unidad">${k==='agua'?'ml':k==='kcal'?'kcal':'g'}</span></div>`).join('');
  document.getElementById('btnActualizar').onclick = () => mostrarConfirm("¿Actualizar este registro?", () => { for(let k in COLORES) c[k] = +document.getElementById('edit-'+k).value || 0; cerrarDetalle(); guardarYActualizar(); });
  document.getElementById('btnBorrarDetalle').onclick = () => mostrarConfirm("¿Borrar este registro?", () => { perfiles[usuarioActual].hoy = perfiles[usuarioActual].hoy.filter(x=>x.id!==id); cerrarDetalle(); guardarYActualizar(); actualizarDropdown(); });
  document.getElementById('modalDetalle').style.display='block';
}
function mostrarConfirm(t, c){ document.getElementById('confirmTexto').innerText = t; callbackConfirm = c; document.getElementById('modalConfirm').style.display='block'; }
function cerrarConfirm(){ document.getElementById('modalConfirm').style.display='none'; }
document.getElementById('confirmSi').onclick = () => { if(callbackConfirm) callbackConfirm(); cerrarConfirm(); };
function verPagina(id, b){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active-page'));
  document.getElementById('page-'+id).classList.add('active-page');
  document.querySelectorAll('.nav-btn').forEach(btn=>btn.classList.remove('active'));
  b.classList.add('active');
  if(id==='historial') renderHistorial(); if(id==='config') cargarMetasInputs();
  if(id==='semanal' || id==='mensual') renderReporte(id);
}
function renderReporte(tipo){
  let p = perfiles[usuarioActual], d = tipo==='semanal'?7:30, h = p.historial.slice(0, d), tot = obtenerTotales(h);
  let fecha = new Date();
  if(tipo==='semanal'){
    let hoy = new Date(), lunes = new Date(hoy.setDate(hoy.getDate()-hoy.getDay()+(hoy.getDay()===0?-6:1)));
    let dom = new Date(lunes); dom.setDate(lunes.getDate()+6);
    document.getElementById('rangoSemanaTexto').innerText = `Desde el Lunes ${lunes.getDate()}/${lunes.getMonth()+1} hasta el Domingo ${dom.getDate()}/${dom.getMonth()+1}`;
  } else {
    document.getElementById('rangoMesTexto').innerText = fecha.toLocaleDateString('es-ES',{month:'long',year:'numeric'});
  }
  document.getElementById('circulos'+tipo.charAt(0).toUpperCase()+tipo.slice(1)).innerHTML = Object.keys(p.METAS).map(k=> renderCircle(k, tot[k], (p.METAS[k]||0)*d)).join('');
}
function renderHistorial(){
  let p = perfiles[usuarioActual], m = p.METAS;
  document.getElementById('historialHeader').innerHTML = `<th>FECHA</th>` + Object.keys(m).map(k=> `<th>${ICONOS[k]} ${k.toUpperCase()}<span class="m-val">${m[k]||0}${k==='agua'?'ml':k==='kcal'?'k':'g'}</span></th>`).join('');
  document.getElementById('tablaHistorial').innerHTML = p.historial.map(h=> `<tr><td>${h.fechaCorta || ''}</td><td>${h.kcal}</td><td>${h.prot}</td><td>${h.carbs}</td><td>${h.grasas}</td><td>${h.fibra}</td><td>${h.agua}</td></tr>`).join('');
}
function cerrarDia(){
  let p = perfiles[usuarioActual], t = obtenerTotales(p.hoy);
  document.getElementById('modalTexto').innerHTML = Object.keys(p.METAS).map(k=>{
    let d = Math.round(t[k]-p.METAS[k]); return `• ${ICONOS[k]} ${k.toUpperCase()}: ${d>0?'Sobra '+d:'Faltó '+Math.abs(d)}<br>`;
  }).join('');
  document.getElementById('miModalResumen').style.display='block'; document.getElementById('sonidoAplausos').play(); confetti();
  t.fechaCorta = getFechaConDia(new Date()); p.historial.unshift(t); p.hoy=[]; guardarYActualizar();
}
function actualizarDropdown(){ let h = perfiles[usuarioActual].hoy.map(c=>c.tipo), s = document.getElementById('tipoComida'); s.innerHTML = ["🍳 Desayuno", "🍎 Colación AM", "🍱 Almuerzo", "🥪 Colación PM", "🍽️ Cena", "💧 Solo Agua"].filter(c=> !h.includes(c) || c==="💧 Solo Agua").map(c=>`<option value="${c}">${c}</option>`).join(''); verificarSoloAgua(); }
function cerrarDetalle(){ document.getElementById('modalDetalle').style.display='none'; }
function cerrarModal(){ document.getElementById('miModalResumen').style.display='none'; }
function saltarEnter(e, n){ if(e.key==='Enter'){ e.preventDefault(); if(n==='btnRegistrar') registrarComida(); else document.getElementById(n).focus(); } }
function cargarMetasInputs(){ let m = perfiles[usuarioActual].METAS; for(let k in m) if(document.getElementById('m'+k.charAt(0).toUpperCase()+k.slice(1))) document.getElementById('m'+k.charAt(0).toUpperCase()+k.slice(1)).value = m[k]; }
function guardarMetas(){ let m = perfiles[usuarioActual].METAS; ['Kcal','Prot','Carbs','Grasas','Fibra','Agua'].forEach(k=> m[k.toLowerCase()] = +document.getElementById('m'+k).value || 0); guardarYActualizar(); alert("Metas guardadas"); }
function cambiarPerfil(){ localStorage.removeItem('nutriUsuarioActivo'); location.reload(); }
</script>
</body>
</html>
