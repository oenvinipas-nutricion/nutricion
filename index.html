<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=yes">
<title>Control Total Enrique</title>

<link rel="icon" href="https://emojicdn.elk.sh/🥑">
<link rel="apple-touch-icon" href="https://emojicdn.elk.sh/🥑">

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>

<style>
* { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

body {
  font-family:-apple-system,BlinkMacSystemFont,sans-serif;
  background:#000;
  color:#eee;
  margin:0;
  padding:10px;
  padding-bottom:120px;
}

.container { max-width:420px; margin:auto; }

.page { display:none; }
.active-page { display:block !important; }

h2, h3 {
  text-align:center;
  color:#fff;
  text-transform:uppercase;
  letter-spacing:1px;
}

.subtitulo {
  text-align:center;
  color:#0a84ff;
  font-size:0.9em;
  margin-bottom:15px;
  font-weight:bold;
}

.panel-card {
  background:#161618;
  border:1px solid #2c2c2e;
  border-radius:20px;
  padding:15px 12px;
  margin-bottom:18px;
}

.panel-header {
  font-size:0.8em;
  font-weight:800;
  text-align:center;
  margin-bottom:12px;
  text-transform:uppercase;
  color:#aaa;
}

/* 🔥 REGISTRO COMPACTO */
.grid-registro {
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
  margin-bottom:12px;
}

.cuadro-f3 {
  background:#050507;
  border:1px solid #3a3a3c;
  border-radius:14px;
  height:90px;
  position:relative;
  padding:10px;
}

/* etiqueta arriba */
.label-f3 {
  position:absolute;
  top:6px;
  left:10px;
  font-size:0.7em;
  font-weight:800;
  color:#8e8e93;
}

/* icono abajo */
.icon-f3 {
  position:absolute;
  left:10px;
  bottom:8px;
  font-size:1.4em;
}

/* input elegante */
.input-f3 {
  position:absolute;
  top:50%;
  left:55%;
  transform:translate(-50%,-40%);
  background:transparent;
  border:none;
  color:#fff;
  font-size:1.2em;
  font-weight:700;
  text-align:center;
  width:60px;
  outline:none;
}

/* unidad derecha */
.unit-f3 {
  position:absolute;
  right:10px;
  top:50%;
  transform:translateY(-40%);
  font-size:0.7em;
  color:#a1a1aa;
  font-weight:bold;
}

/* SELECTORES */
.selector-fijo {
  background:#1c1c1e;
  border:1px solid #333;
  color:#fff;
  padding:12px;
  border-radius:12px;
  width:100%;
  margin-bottom:10px;
  text-align-last:center;
  font-weight:bold;
  cursor:pointer;
}

.selector-modificar {
  background:#ff9f0a;
  color:white;
  border:none;
}

/* BOTONES */
.btn-blue {
  background:#1c3d99;
  color:white;
  width:100%;
  padding:14px;
  border:none;
  border-radius:12px;
  font-weight:800;
  cursor:pointer;
}

.btn-green {
  background:#248a3d;
  color:white;
  width:100%;
  padding:14px;
  border:none;
  border-radius:12px;
  font-weight:bold;
  cursor:pointer;
}

/* NAV */
.nav-bar {
  position:fixed;
  bottom:0;
  left:0;
  right:0;
  background:#111;
  display:none;
  padding:10px 5px 25px;
}

.nav-btn {
  background:none;
  border:none;
  color:#8e8e93;
  display:flex;
  flex-direction:column;
  align-items:center;
  font-size:0.7em;
  flex:1;
}

.nav-btn.active { color:#0a84ff; }

</style>
</head>

<body onload="cargarTodo()">

<div class="container">

<div id="page-perfil" class="page active-page">
<h2 style="margin-top:60px;">Control Total</h2>

<div class="panel-card">
<input type="text" id="inputNombre" style="background:#1c1c1e;border:1px solid #333;color:#fff;padding:15px;border-radius:12px;width:100%;text-align:center;font-weight:bold;margin-bottom:15px;" placeholder="TU NOMBRE">

<button class="btn-blue" onclick="ingresarUsuario()">COMENZAR</button>
</div>
</div>

<div id="page-hoy" class="page">

<h2 id="saludoHoy">HOLA</h2>
<p class="subtitulo" id="fechaHoy"></p>

<div class="panel-card">
<div class="panel-header">✍️ REGISTRO DIARIO</div>

<select id="tipoComida" class="selector-fijo"></select>

<div class="grid-registro" id="formRegistro"></div>

<button class="btn-blue" onclick="registrarComida()">REGISTRAR</button>
</div>

</div>

</div>

<script>

let perfiles={},usuarioActual=null;

const ICONOS={kcal:'🔥',prot:'💪',carbs:'🍞',grasas:'🥑',fibra:'🌿',agua:'💧'};

function cargarTodo(){
let d=localStorage.getItem('nutriDataV6');
if(d) perfiles=JSON.parse(d);
}

function ingresarUsuario(){
let n=document.getElementById('inputNombre').value.trim().toUpperCase();
if(!n)return;

if(!perfiles[n]) perfiles[n]={hoy:[]};

usuarioActual=n;
renderForm();
}

function renderForm(){
const cont=document.getElementById('formRegistro');

cont.innerHTML=Object.keys(ICONOS).map(k=>`
<div class="cuadro-f3">
<div class="label-f3">${k.toUpperCase()}</div>
<div class="icon-f3">${ICONOS[k]}</div>
<input type="number" class="input-f3" id="${k}">
<div class="unit-f3">${k==='agua'?'ml':(k==='kcal'?'kcal':'gr')}</div>
</div>
`).join('');
}

function registrarComida(){
alert("OK");
}

</script>

</body>
</html>
