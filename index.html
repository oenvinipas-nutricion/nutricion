<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Control Total</title>
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
<style>
  body { font-family:-apple-system,BlinkMacSystemFont,sans-serif; padding:10px; background:#000; color:#eee; margin-bottom:90px; -webkit-tap-highlight-color: transparent; }
  .container{max-width:420px; margin:auto;}
  h2,h3{text-align:center;color:#fff;}
  .subtitulo{text-align:center; color:#0a84ff; font-size:0.85em; margin-bottom:20px; font-weight:bold;}
  .page{display:none;} .active-page{display:block;}
  .nav-bar{position:fixed;bottom:0;left:0;right:0;background:rgba(15,15,15,0.95);backdrop-filter:blur(15px);display:flex;padding:12px 5px 30px 5px;border-top:0.5px solid #333;z-index:1000;}
  .nav-btn{background:none;border:none;color:#8e8e93;display:flex;flex-direction:column;align-items:center;font-size:0.7em;flex:1;}
  .nav-btn.active{color:#0a84ff;font-weight:bold;}
  
  .panel-card { background: linear-gradient(145deg, #161618 0%, #0f0f11 100%); border: 1px solid #2c2c2e; border-radius: 20px; padding: 20px 15px; margin-bottom: 25px; box-shadow: 0 8px 30px rgba(0,0,0,0.6); position: relative;}
  .panel-luminoso { background: radial-gradient(circle at top, #1e1e24 0%, #111 80%); border: 1px solid #333; }
  .panel-header { font-size: 0.85em; font-weight: 800; text-align: center; margin-bottom: 18px; text-transform: uppercase; letter-spacing: 1.5px; }
  
  .guia-grid-fija { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
  .guia-item { background: linear-gradient(180deg, #1c1c1e, #111); border: 1px solid #333; border-radius: 12px; padding: 12px 2px; text-align: center; }
  .guia-val { font-size: 1.1em; font-weight: bold; display: block; margin-top: 5px; }
  .guia-lab { font-size: 0.65em; color: #aaa; text-transform: uppercase; font-weight:bold;}

  .input-grid { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
  .input-box { background: #111; border: 1px solid #333; border-radius: 12px; display: flex; align-items: center; justify-content: center; height: 50px; }
  .input-box input { background: transparent; border: none; color: #fff; font-size: 1.1em; font-weight: bold; text-align: center; width: 55px; outline: none; }
  .input-box .icono { font-size: 1.1em; margin-right: 2px; }
  .input-box .unidad { font-size: 0.75em; color: #8e8e93; font-weight: bold; }
  .input-box.disabled { opacity: 0.3; }

  .btn-trash { position: absolute; top: 15px; right: 15px; background: rgba(255, 69, 58, 0.1); border: 1px solid #ff453a; border-radius: 50%; width: 42px; height: 42px; display: flex; align-items: center; justify-content: center; font-size: 1.3em; cursor: pointer; color: #ff453a; }

  select, .input-perfil { background:#111; border:1px solid #333; color:#fff; padding:15px; border-radius:12px; width:100%; margin-bottom:12px; font-size:16px; text-align-last:center; font-weight:bold; }
  .btn-blue{background:linear-gradient(145deg, #1c3d99, #0a84ff);color:white;width:100%;padding:16px;border:none;border-radius:12px;font-weight:bold; font-size:1.1em; text-transform:uppercase;}
  .btn-green{background:linear-gradient(145deg, #248a3d, #32d74b);color:white;width:100%;padding:16px;border:none;border-radius:12px;font-weight:bold; font-size:1.1em; text-transform:uppercase;}
  .btn-white{background:#fff;color:#000;width:100%;padding:16px;border:none;border-radius:12px;font-weight:bold;}

  .lista-horizontal-scroll { display: flex; overflow-x: auto; gap: 12px; padding-bottom: 10px; scrollbar-width: none; }
  .log-card { background: #1c1c1e; border: 1px solid #333; border-radius: 15px; padding: 15px; min-width: 110px; text-align: center; flex: 0 0 auto; cursor:pointer;}
  
  .modal-overlay { display:none; position:fixed; z-index:2000; left:0; top:0; width:100%; height:100%; background:rgba(0,0,0,0.9); backdrop-filter:blur(8px); }
  .modal-content { background:#161618; margin: 10% auto; padding:25px; border:1px solid #333; width:85%; border-radius:25px; color:white; position: relative; box-shadow: 0 20px 40px rgba(0,0,0,0.8); }
  
  .grid-circles{display:grid;grid-template-columns:repeat(3,1fr);gap:20px 5px; text-align:center;}
  .circle-container{position:relative;width:80px;height:80px;margin:auto;} 
  .circle-svg{transform:rotate(-90deg);width:100%;height:100%;}
  .circle-bg{fill:none;stroke:#1c1c1e;stroke-width:6;} 
  .circle-bar{fill:none;stroke-width:6;stroke-linecap:round;transition:stroke-dasharray 0.8s ease;}
  .circle-text{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:1em;font-weight:bold;} 
  .scroll-area {max-height:400px; overflow-y:auto;}
  table {width:100%; border-collapse:collapse; font-size:0.85em; text-align:center;} 
  td {padding:12px 2px; border-bottom:1px solid #222; color:#eee;}
  th {padding:10px 2px; color:#aaa; font-weight:bold; border-bottom:1px solid #333; text-transform: uppercase; font-size: 0.75em;}

  @media print { .nav-bar, button, select, .lista-horizontal-scroll { display: none !important; } .active-page { display: block !important; } body { background: white; color: black; } .panel-card { background: white !important; color: black !important; border: 1px solid #eee !important; box-shadow:none !important;} .scroll-area { max-height: none !important; } }
</style>
</head>
<body onload="cargarTodo()">
<audio id="sonidoAplausos" src="https://assets.mixkit.co/active_storage/sfx/2013/2013-preview.mp3" crossorigin="anonymous"></audio>

<div class="container">
  <div id="page-perfil" class="page active-page">
    <h2 style="margin-top:60px;">Control Total</h2>
    <input type="text" id="inputNombre" class="input-perfil" placeholder="Tu nombre">
    <button class="btn-blue" style="width:100%" onclick="ingresarUsuario()">🚀 Entrar</button>
  </div>

  <div id="page-hoy" class="page">
    <p class="subtitulo" id="fechaHoy"></p>
    <div class="panel-card" id="guiaDinamica" style="display:none;">
      <div class="panel-header" style="color:#0a84ff;">💡 SUGERENCIA</div>
      <div class="guia-grid-fija" id="guiaValores"></div>
    </div>
    <div class="panel-card">
      <div class="panel-header">✍️ REGISTRO</div>
      <select id="tipoComida" onchange="verificarSoloAgua()"></select>
      <div class="input-grid">
        <div class="input-box" id="box-kcal"><span class="icono">🔥</span><input type="number" id="kcal" onkeydown="saltarEnter(event,'prot')"><span class="unidad">kcal</span></div>
        <div class="input-box" id="box-prot"><span class="icono">💪</span><input type="number" id="prot" onkeydown="saltarEnter(event,'carbs')"><span class="unidad">g</span></div>
        <div class="input-box" id="box-carbs"><span class="icono">🍞</span><input type="number" id="carbs" onkeydown="saltarEnter(event,'grasas')"><span class="unidad">g</span></div>
        <div class="input-box" id="box-grasas"><span class="icono">🥑</span><input type="number" id="grasas" onkeydown="saltarEnter(event,'fibra')"><span class="unidad">g</span></div>
        <div class="input-box" id="box-fibra"><span class="icono">🌿</span><input type="number" id="fibra" onkeydown="saltarEnter(event,'agua')"><span class="unidad">g</span></div>
        <div class="input-box" id="box-agua"><span class="icono">💧</span><input type="number" id="agua" onkeydown="saltarEnter(event,'btnRegistrar')"><span class="unidad">ml</span></div>
      </div>
      <button class="btn-blue" id="btnRegistrar" style="margin-top:15px; width:100%" onclick="registrarComida()">GUARDAR</button>
    </div>
    <div class="panel-card panel-luminoso">
      <div class="panel-header" style="color:#32d74b;">📊 PROGRESO DE HOY</div>
      <div class="grid-circles" id="circulosHoy"></div>
    </div>
    <div class="panel-card">
      <div class="panel-header" style="color:#aaa;">📋 REGISTROS</div>
      <div id="listaComidasHoy"></div>
    </div>
    <button class="btn-green" style="width:100%" onclick="cerrarDia()">💾 FINALIZAR DÍA</button>
  </div>

  <div id="page-semanal" class="page"><h2>Semana</h2><p class="subtitulo" id="rangoSemanaTexto"></p><div class="panel-card panel-luminoso"><div class="grid-circles" id="circulosSemanal"></div><p id="msgSemana" style="text-align:center;font-size:0.8em;color:#888;margin-top:15px;"></p></div><button class="btn-white" style="width:100%" onclick="window.print()">📄 PDF SEMANAL</button></div>
  <div id="page-mensual" class="page"><h2>Mes</h2><p class="subtitulo" id="rangoMesTexto"></p><div class="panel-card panel-luminoso"><div class="grid-circles" id="circulosMensual"></div><p id="msgMes" style="text-align:center;font-size:0.8em;color:#888;margin-top:15px;"></p></div><button class="btn-white" style="width:100%" onclick="window.print()">📄 PDF MENSUAL</button></div>
  <div id="page-historial" class="page"><h2>Historial</h2><div class="panel-card"><div class="scroll-area"><table><thead><tr id="historialHeader"></tr></thead><tbody id="tablaHistorial"></tbody></table></div></div><button class="btn-white" style="width:100%" onclick="window.print()">📄 PDF HISTORIAL</button></div>
  
  <div id="page-config" class="page">
    <h2>Metas</h2>
    <div class="panel-card">
      <div class="input-grid">
        <div class="input-box"><span>🔥</span><input type="number" id="mKcal"><span>kcal</span></div>
        <div class="input-box"><span>💪</span><input type="number" id="mProt"><span>g</span></div>
        <div class="input-box"><span>🍞</span><input type="number" id="mCarbs"><span>g</span></div>
        <div class="input-box"><span>🥑</span><input type="number" id="mGrasas"><span>g</span></div>
        <div class="input-box"><span>🌿</span><input type="number" id="mFibra"><span>g</span></div>
        <div class="input-box"><span>💧</span><input type="number" id="mAgua"><span>ml</span></div>
      </div>
      <button class="btn-green" style="width:100%;margin-top:15px;" onclick="guardarMetas()">💾 GUARDAR METAS</button>
    </div>
    <button class="btn-blue" style="background:#333;margin-top:20px;width:100%" onclick="cambiarPerfil()">Cerrar Sesión</button>
  </div>
</div>

<div id="modalDetalle" class="modal-overlay">
  <div class="modal-content">
    <div class="btn-trash" id="btnBorrarDetalle">🗑️</div>
    <h3 id="detalleTitulo" style="color:#0a84ff; text-align:left; margin-bottom:20px;">Editar</h3>
    <div id="detalleContenido" class="input-grid"></div>
    <button class="btn-green" style="width:100%; margin-top:20px;" id="btnActualizar">✅ ACTUALIZAR DATOS</button>
    <button class="btn-white" style="width:100%; margin-top:10px;" onclick="cerrarDetalle()">↩️ VOLVER</button>
  </div>
</div>

<div id="modalConfirm" class="modal-overlay">
  <div class="modal-content" style="text-align:center;">
    <h3 style="color:#ff453a;">¿Estás seguro?</h3>
    <p id="confirmTexto" style="margin-bottom:25px;"></p>
    <button class="btn-blue" style="background:#ff453a; margin-bottom:10px; width:100%" id="confirmSi">SÍ, CONTINUAR</button>
    <button class="btn-white" style="width:100%" onclick="cerrarConfirm()">CANCELAR</button>
  </div>
</div>

<div id="miModalResumen" class="modal-overlay"><div class="modal-content"><h3>📊 Resumen</h3><div id="modalTexto" style="text-align:left; font-size:0.9em;"></div><button class="btn-blue" style="width:100%;margin-top:15px" onclick="cerrarModal()">Aceptar</button></div></div>

<div class="nav-bar" id="main-nav" style="display:none;">
  <button class="nav-btn active" onclick="verPagina('hoy', this)"><span>📝</span>Hoy</button>
  <button class="nav-btn" onclick="verPagina('semanal', this)"><span>📊</span>Semana</button>
  <button class="nav-btn" onclick="verPagina('mensual', this)"><span>📆</span>Mes</button>
  <button class="nav-btn" onclick="verPagina('historial', this)"><span>📚</span>Historial</button>
  <button class="nav-btn" onclick="verPagina('config', this)"><span>⚙️</span>Metas</button>
</div>

<script>
let perfiles = {}, usuarioActual = null, callbackConfirm = null;
const COLORES = { kcal:'#ff453a', prot:'#0a84ff', carbs:'#ff9f0a', grasas:'#32d74b', fibra:'#bf5af2', agua:'#00bfff' };
const ICONOS = { kcal:'🔥', prot:'💪', carbs:'🍞', grasas:'🥑', fibra:'🌿', agua:'💧' };
const NOMBRES = { kcal:'Calorías', prot:'Proteína', carbs:'Carbohidratos', grasas:'Grasas', fibra:'Fibra', agua:'Agua' };

function cargarTodo(){
  let d = localStorage.getItem('nutriDataV6'); if(d) perfiles = JSON.parse(d);
  let u = localStorage.getItem('nutriUsuarioActivo'); if(u && perfiles[u]) seleccionarPerfil(u);
}
function ingresarUsuario(){
  let n = document.getElementById('inputNombre').value.trim(); if(!n) return;
  n = n.charAt(0).toUpperCase() + n.slice(1).toLowerCase();
  if(!perfiles[n]) perfiles[n] = { METAS:{kcal:'',prot:'',carbs:'',grasas:'',fibra:'',agua:''}, hoy:[], historial:[] };
  seleccionarPerfil(n);
}
function seleccionarPerfil(n){
  usuarioActual = n; localStorage.setItem('nutriUsuarioActivo', n);
  document.getElementById('page-perfil').classList.remove('active-page');
  document.getElementById('page-hoy').classList.add('active-page');
  document.getElementById('main-nav').style.display = 'flex';
  actualizarDropdown(); actualizarUI();
}
function actualizarDropdown(){
  let h = perfiles[usuarioActual].hoy.map(c=>c.tipo), s = document.getElementById('tipoComida');
  s.innerHTML = ["🍳 Desayuno", "🍎 Colación AM", "🍱 Almuerzo", "🥪 Colación PM", "🍽️ Cena", "💧 Solo Agua"].filter(c=> !h.includes(c) || c==="💧 Solo Agua").map(c=>`<option value="${c}">${c}</option>`).join('');
  verificarSoloAgua();
}
function verificarSoloAgua(){
  let es = document.getElementById('tipoComida').value === "💧 Solo Agua";
  ['kcal','prot','carbs','grasas','fibra'].forEach(id=>{
    document.getElementById(id).disabled = es; if(es) document.getElementById(id).value = '';
    document.getElementById('box-'+id).classList.toggle('disabled', es);
  });
}
function saltarEnter(e, n){ if(e.key==='Enter'){ e.preventDefault(); if(n==='btnRegistrar') registrarComida(); else document.getElementById(n).focus(); } }
function registrarComida(){
  let s = document.getElementById('tipoComida').value, a = +document.getElementById('agua').value || 0;
  if(s === "💧 Solo Agua"){
    let ex = perfiles[usuarioActual].hoy.find(c=>c.tipo === "💧 Solo Agua");
    if(ex) ex.agua += a; else perfiles[usuarioActual].hoy.push({id:Date.now(),tipo:s,kcal:0,prot:0,carbs:0,grasas:0,fibra:0,agua:a});
  } else {
    perfiles[usuarioActual].hoy.push({id:Date.now(),tipo:s,kcal:+document.getElementById('kcal').value||0,prot:+document.getElementById('prot').value||0,carbs:+document.getElementById('carbs').value||0,grasas:+document.getElementById('grasas').value||0,fibra:+document.getElementById('fibra').value||0,agua:a});
  }
  ['kcal','prot','carbs','grasas','fibra','agua'].forEach(id=>document.getElementById(id).value='');
  guardarYActualizar(); actualizarDropdown();
}
function guardarYActualizar(){ localStorage.setItem('nutriDataV6', JSON.stringify(perfiles)); actualizarUI(); }
function obtenerTotales(l){ return l.reduce((a,c)=>({kcal:a.kcal+c.kcal,prot:a.prot+c.prot,carbs:a.carbs+c.carbs,grasas:a.grasas+c.grasas,fibra:a.fibra+c.fibra,agua:a.agua+c.agua}),{kcal:0,prot:0,carbs:0,grasas:0,fibra:0,agua:0}); }
function actualizarUI(){
  let p = perfiles[usuarioActual], t = obtenerTotales(p.hoy);
  document.getElementById('circulosHoy').innerHTML = Object.keys(p.METAS).map(k=> renderCircle(k, t[k], p.METAS[k])).join('');
  document.getElementById('listaComidasHoy').innerHTML = p.hoy.length ? `<div class="lista-horizontal-scroll">`+p.hoy.map(c=> `<div class="log-card" onclick="abrirDetalle(${c.id})"><div style="font-size:0.7em;color:#aaa">${c.tipo}</div><div style="font-weight:bold;color:${c.tipo.includes('Agua')?'#00bfff':'#ff453a'}">${c.tipo.includes('Agua')?c.agua+'ml':c.kcal+'kcal'}</div></div>`).join('')+`</div>` : `<p style="text-align:center;color:#666;font-size:0.8em;">Vacío</p>`;
  actualizarGuia(p.hoy, p.METAS, t);
}
function renderCircle(k, a, m){
  let p = (m>0)? Math.min((a/m)*100,100) : 0, d = p*2.2, u = k==='agua'?'ml':k==='kcal'?'kcal':'g', r = m-a;
  let txt = (m==='' || m==0)?'-' : (r>0?`Faltan ${Math.round(r)}${u}` : `<span style="color:#ff453a;">+${Math.abs(Math.round(r))}${u}</span>`);
  return `<div class="circle-wrapper"><div class="circle-container"><svg class="circle-svg" viewBox="0 0 80 80"><circle class="circle-bg" cx="40" cy="40" r="35"/><circle class="circle-bar" cx="40" cy="40" r="35" style="stroke:${COLORES[k]};stroke-dasharray:${d} 220; transition: 0.5s"/></svg><div class="circle-text" style="color:${COLORES[k]}">${Math.round(p)}%</div></div><div style="font-size:0.6em;font-weight:bold;margin-top:5px;color:#aaa">${ICONOS[k]} ${k.toUpperCase()}</div><div style="font-size:0.65em;color:#888">${txt}</div></div>`;
}
function actualizarGuia(h, m, t){
  let pr = ["🍳 Desayuno", "🍱 Almuerzo", "🍽️ Cena"].filter(c=> !h.map(x=>x.tipo).includes(c));
  if(!pr.length){ document.getElementById('guiaDinamica').style.display='none'; return; }
  document.getElementById('guiaDinamica').style.display='block';
  document.getElementById('guiaValores').innerHTML = Object.keys(m).map(k=> {
    let r = Math.max(0, (m[k]||0)-t[k]), sug = Math.round(r/pr.length), un = k==='agua'?'ml':k==='kcal'?'kcal':'g';
    return `<div class="guia-item" style="border-bottom:3px solid ${COLORES[k]}"><span class="guia-lab">${ICONOS[k]} ${k}</span><span class="guia-val" style="color:${COLORES[k]}">${sug}${un}</span></div>`;
  }).join('');
}
function abrirDetalle(id){
  let c = perfiles[usuarioActual].hoy.find(x=>x.id===id);
  document.getElementById('detalleTitulo').innerText = "Editar " + c.tipo;
  document.getElementById('detalleContenido').innerHTML = Object.keys(COLORES).map(k=> `<div class="input-box"><span class="icono">${ICONOS[k]}</span><input type="number" id="edit-${k}" value="${c[k]}"><span class="unidad">${k==='agua'?'ml':k==='kcal'?'kcal':'g'}</span></div>`).join('');
  document.getElementById('btnActualizar').onclick = () => mostrarConfirm("¿Deseas actualizar este registro?", () => { for(let k in COLORES) c[k] = +document.getElementById('edit-'+k).value || 0; cerrarDetalle(); guardarYActualizar(); });
  document.getElementById('btnBorrarDetalle').onclick = () => mostrarConfirm("¿Deseas borrar este registro?", () => { perfiles[usuarioActual].hoy = perfiles[usuarioActual].hoy.filter(x=>x.id!==id); cerrarDetalle(); guardarYActualizar(); actualizarDropdown(); });
  document.getElementById('modalDetalle').style.display='block';
}
function mostrarConfirm(txt, cb){ document.getElementById('confirmTexto').innerText = txt; callbackConfirm = cb; document.getElementById('modalConfirm').style.display='block'; }
function cerrarConfirm(){ document.getElementById('modalConfirm').style.display='none'; }
document.getElementById('confirmSi').onclick = () => { if(callbackConfirm) callbackConfirm(); cerrarConfirm(); };
function cerrarDetalle(){ document.getElementById('modalDetalle').style.display='none'; }
function cerrarModal(){ document.getElementById('miModalResumen').style.display='none'; }
function cerrarDia(){
  let p = perfiles[usuarioActual], t = obtenerTotales(p.hoy);
  let res = Object.keys(p.METAS).map(k=>{
    let d = Math.round(t[k] - p.METAS[k]), u = k==='agua'?'ml':k==='kcal'?'kcal':'g';
    return `• ${ICONOS[k]} ${k.toUpperCase()}: ${d>0? '<b style="color:#ff453a;">Sobra '+d : '<b style="color:#ff9f0a;">Faltó '+Math.abs(d)} ${u}</b><br>`;
  }).join('');
  document.getElementById('modalTexto').innerHTML = res; document.getElementById('miModalResumen').style.display='block';
  document.getElementById('sonidoAplausos').play(); confetti();
  t.fechaCorta = new Date().toLocaleDateString(); p.historial.unshift(t); p.hoy = []; guardarYActualizar();
}
function verPagina(id, b){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active-page'));
  document.getElementById('page-'+id).classList.add('active-page');
  document.querySelectorAll('.nav-btn').forEach(btn=>btn.classList.remove('active'));
  b.classList.add('active');
  if(id==='historial') renderHistorial(); if(id==='config') cargarMetasInputs();
  if(id==='semanal') renderReporte('semanal'); if(id==='mensual') renderReporte('mensual');
}
function renderReporte(tipo){
  let p = perfiles[usuarioActual], m = p.METAS, t = tipo==='semanal'? 7 : 30, h = p.historial.slice(0, t), tot = obtenerTotales(h);
  document.getElementById('circulos'+tipo.charAt(0).toUpperCase()+tipo.slice(1)).innerHTML = Object.keys(m).map(k=> renderCircle(k, tot[k], (m[k]||0)*t)).join('');
  document.getElementById('msg'+tipo.charAt(0).toUpperCase()+tipo.slice(1)).innerText = `Basado en los últimos ${h.length} días vs meta de ${t} días.`;
}
function renderHistorial(){
  let p = perfiles[usuarioActual];
  document.getElementById('historialHeader').innerHTML = `<th>Fecha</th>`+Object.keys(p.METAS).map(k=>`<th>${ICONOS[k]}</th>`).join('');
  document.getElementById('tablaHistorial').innerHTML = p.historial.map(h=> `<tr><td>${h.fechaCorta}</td><td>${h.kcal}</td><td>${h.prot}</td><td>${h.carbs}</td><td>${h.grasas}</td><td>${h.fibra}</td><td>${h.agua}</td></tr>`).join('');
}
function cargarMetasInputs(){ let m = perfiles[usuarioActual].METAS; for(let k in m) if(document.getElementById('m'+k.charAt(0).toUpperCase()+k.slice(1))) document.getElementById('m'+k.charAt(0).toUpperCase()+k.slice(1)).value = m[k]; }
function guardarMetas(){
  let m = perfiles[usuarioActual].METAS;
  ['Kcal','Prot','Carbs','Grasas','Fibra','Agua'].forEach(k=> m[k.toLowerCase()] = +document.getElementById('m'+k).value || 0);
  guardarYActualizar(); alert("Metas guardadas ✅");
}
function cambiarPerfil(){ localStorage.removeItem('nutriUsuarioActivo'); location.reload(); }
</script>
