<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Control Total Pro</title>

<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="theme-color" content="#000000">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

<link rel="apple-touch-icon" sizes="180x180" href="https://em-content.zobj.net/source/apple/354/avocado_1f951.png">
<link rel="icon" type="image/png" href="https://em-content.zobj.net/source/apple/354/avocado_1f951.png">

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
<style>
  body { font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif; padding:10px; background:#000; color:#eee; margin-bottom:90px; -webkit-tap-highlight-color: transparent; }
  .container{background:#000; padding:10px; max-width:420px; margin:auto;}
  h2,h3{text-align:center;color:#fff;margin-bottom:5px; font-weight:600;}
  .subtitulo{text-align:center; color:#0a84ff; font-size:0.85em; margin-bottom:20px; font-weight:bold;}
  
  .page{display:none;} .active-page{display:block;}
  .nav-bar{position:fixed;bottom:0;left:0;right:0;background:rgba(15,15,15,0.95);backdrop-filter:blur(15px);display:flex;justify-content:space-around;padding:12px 5px 30px 5px;border-top:0.5px solid #333;z-index:1000;}
  .nav-btn{background:none;border:none;color:#8e8e93;cursor:pointer;display:flex;flex-direction:column;align-items:center;font-size:0.7em;flex:1;}
  .nav-btn.active{color:#0a84ff;font-weight:bold;}
  .nav-icon{font-size:1.6em;margin-bottom:4px;}

  /* GUÍA DINÁMICA - NUEVO */
  .guia-card { background: #1c1c1e; border: 1px solid #0a84ff; border-radius: 20px; padding: 15px; margin-bottom: 20px; box-shadow: 0 4px 15px rgba(10, 132, 255, 0.2); }
  .guia-titulo { font-size: 0.9em; color: #0a84ff; font-weight: bold; text-align: center; margin-bottom: 15px; text-transform: uppercase; letter-spacing: 1px;}
  .guia-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; text-align: center; }
  .guia-item { background: #2c2c2e; border-radius: 12px; padding: 10px 5px; }
  .guia-val { font-size: 1.1em; font-weight: bold; color: #fff; display: block; margin-top: 5px;}
  .guia-lab { font-size: 0.65em; color: #aaa; text-transform: uppercase;}

  /* Círculos XL */
  .grid-circles{display:grid;grid-template-columns:repeat(3,1fr);gap:25px 5px;margin:30px 0;text-align:center;}
  .circle-wrapper{display:flex; flex-direction:column; align-items:center;}
  .circle-container{position:relative;width:80px;height:80px;} 
  .circle-svg{transform:rotate(-90deg);width:100%;height:100%;}
  .circle-bg{fill:none;stroke:#1c1c1e;stroke-width:6;} 
  .circle-bar{fill:none;stroke-width:6;stroke-linecap:round;transition:stroke-dasharray 0.8s ease;}
  .circle-text{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:1.1em;font-weight:bold;} 
  
  /* Formularios */
  input, select{background:#111;border:1px solid #333;color:#fff;padding:15px;border-radius:12px;width:100%;box-sizing:border-box;margin-bottom:12px;font-size:16px;}
  .input-grid{display:grid; grid-template-columns:1fr 1fr; gap:10px;}
  .btn-blue{background:#0a84ff;color:white;width:100%;padding:16px;border:none;border-radius:12px;font-weight:bold;cursor:pointer; margin-bottom: 10px;}
  .btn-green{background:#34c759;color:white;width:100%;padding:16px;border:none;border-radius:12px;font-weight:bold;cursor:pointer;margin-top:15px;}
  
  .log-item{display:flex;justify-content:space-between;background:#111;padding:15px;border-radius:12px;margin-bottom:8px;border:1px solid #222;}
  .modal-overlay { display:none; position:fixed; z-index:2000; left:0; top:0; width:100%; height:100%; background:rgba(0,0,0,0.85); backdrop-filter:blur(5px); }
  .modal-content { background:#1c1c1e; margin: 30% auto; padding:25px; border:1px solid #333; width:80%; border-radius:20px; color:white; }
</style>
</head>
<body onload="cargarTodo()">

<div class="container">
  <div id="page-perfil" class="page active-page">
    <h2>Control Total</h2>
    <input type="text" id="inputNombre" placeholder="Tu nombre..." style="text-align:center;">
    <button class="btn-blue" onclick="ingresarUsuario()">ENTRAR</button>
  </div>

  <div id="page-hoy" class="page">
    <p class="subtitulo" id="fechaHoy"></p>

    <div class="guia-card" id="guiaDinamica">
      <div class="guia-titulo" id="guiaTexto">Sugerencia para tu próxima comida</div>
      <div class="guia-grid" id="guiaValores">
        </div>
    </div>
    
    <select id="tipoComida" onchange="actualizarGuiaInteractiva()"></select>
    
    <div class="input-grid">
      <input type="number" id="kcal" placeholder="🔥 KCal">
      <input type="number" id="prot" placeholder="💪 Prot">
      <input type="number" id="carbs" placeholder="🍞 Carb">
      <input type="number" id="grasas" placeholder="🥑 Gras">
      <input type="number" id="fibra" placeholder="🌿 Fibr">
      <input type="number" id="agua" placeholder="💧 Agua">
    </div>
    
    <button class="btn-blue" onclick="registrarComida()">+ REGISTRAR REGISTRO</button>
    
    <div class="grid-circles" id="circulosHoy"></div>
    <div id="listaComidasHoy"></div>
    <button class="btn-green" onclick="cerrarDia()">💾 FINALIZAR DÍA</button>
  </div>

  <div id="page-historial" class="page"><h2>Historial</h2><div id="tablaHistorial"></div></div>
  <div id="page-config" class="page">
    <h2>Tus Metas</h2>
    <input type="number" id="mKcal" placeholder="Meta KCal"><input type="number" id="mProt" placeholder="Meta Prot">
    <input type="number" id="mCarbs" placeholder="Meta Carb"><input type="number" id="mGrasas" placeholder="Meta Gras">
    <input type="number" id="mFibra" placeholder="Meta Fibra"><input type="number" id="mAgua" placeholder="Meta Agua">
    <button class="btn-green" onclick="guardarMetas()">GUARDAR METAS</button>
  </div>
</div>

<div id="miModalResumen" class="modal-overlay">
  <div class="modal-content"><div id="modalTexto"></div><button class="btn-blue" onclick="cerrarModal()">OK</button></div>
</div>

<div class="nav-bar" id="main-nav" style="display:none;">
  <button class="nav-btn active" onclick="verPagina('hoy', this)">📝 Hoy</button>
  <button class="nav-btn" onclick="verPagina('historial', this)">📚 Historial</button>
  <button class="nav-btn" onclick="verPagina('config', this)">⚙️ Metas</button>
</div>

<script>
let perfiles = {};
let usuarioActual = null;
const COMIDAS_PRINCIPALES = ["🍳 Desayuno", "🍱 Almuerzo", "🍽️ Cena"];
const COLORES = { kcal: '#ff453a', prot: '#0a84ff', carbs: '#ff9f0a', grasas: '#32d74b', fibra: '#bf5af2', agua: '#00bfff' };
const ICONOS = { kcal: '🔥', prot: '💪', carbs: '🍞', grasas: '🥑', fibra: '🌿', agua: '💧' };

function cargarTodo() {
  let datos = localStorage.getItem('nutriDataV7');
  if (datos) perfiles = JSON.parse(datos);
  let user = localStorage.getItem('nutriUsuarioActivo');
  if (user) seleccionarPerfil(user);
}

function ingresarUsuario() {
  let nom = document.getElementById('inputNombre').value.trim();
  if(!nom) return;
  if(!perfiles[nom]) perfiles[nom] = { METAS: { kcal: 2000, prot: 150, carbs: 200, grasas: 60, fibra: 30, agua: 2000 }, hoy: [], historial: [] };
  seleccionarPerfil(nom);
}

function seleccionarPerfil(n) {
  usuarioActual = n;
  localStorage.setItem('nutriUsuarioActivo', n);
  document.getElementById('page-perfil').classList.remove('active-page');
  document.getElementById('page-hoy').classList.add('active-page');
  document.getElementById('main-nav').style.display = 'flex';
  actualizarDropdown();
  actualizarUI();
}

function actualizarDropdown() {
  const hoy = perfiles[usuarioActual].hoy.map(c => c.tipo);
  const sel = document.getElementById('tipoComida');
  const opciones = ["🍳 Desayuno", "🍎 Colación AM", "🍱 Almuerzo", "🥪 Colación PM", "🍽️ Cena", "💧 Solo Agua"];
  sel.innerHTML = opciones.map(o => `<option value="${o}">${o}</option>`).join('');
}

function registrarComida() {
  const c = {
    id: Date.now(), tipo: document.getElementById('tipoComida').value,
    kcal: +document.getElementById('kcal').value||0, prot: +document.getElementById('prot').value||0,
    carbs: +document.getElementById('carbs').value||0, grasas: +document.getElementById('grasas').value||0,
    fibra: +document.getElementById('fibra').value||0, agua: +document.getElementById('agua').value||0
  };
  perfiles[usuarioActual].hoy.push(c);
  ['kcal','prot','carbs','grasas','fibra','agua'].forEach(i => document.getElementById(i).value = '');
  guardarYAct();
}

function guardarYAct() {
  localStorage.setItem('nutriDataV7', JSON.stringify(perfiles));
  actualizarUI();
}

function actualizarUI() {
  const hoy = perfiles[usuarioActual].hoy;
  const metas = perfiles[usuarioActual].METAS;
  const tot = hoy.reduce((a, b) => ({
    kcal: a.kcal+b.kcal, prot: a.prot+b.prot, carbs: a.carbs+b.carbs, grasas: a.grasas+b.grasas, fibra: a.fibra+b.fibra, agua: a.agua+b.agua
  }), {kcal:0, prot:0, carbs:0, grasas:0, fibra:0, agua:0});

  // Render Círculos
  document.getElementById('circulosHoy').innerHTML = Object.keys(metas).map(k => {
    const pct = Math.min((tot[k]/metas[k])*100, 100);
    return `<div class="circle-wrapper">
      <div class="circle-container">
        <svg class="circle-svg" viewBox="0 0 80 80"><circle class="circle-bg" cx="40" cy="40" r="35"/><circle class="circle-bar" cx="40" cy="40" r="35" style="stroke:${COLORES[k]}; stroke-dasharray:${pct*2.2} 220;"/></svg>
        <div class="circle-text">${Math.round(pct)}%</div>
      </div>
      <div style="font-size:0.7em; margin-top:5px;">${ICONOS[k]} ${Math.round(metas[k]-tot[k])}</div>
    </div>`;
  }).join('');

  // LÓGICA DE LA GUÍA DINÁMICA
  actualizarGuiaDinamica(hoy, metas, tot);

  document.getElementById('listaComidasHoy').innerHTML = hoy.map(c => `<div class="log-item"><span>${c.tipo}</span><span>${c.kcal} kcal</span></div>`).join('');
}

function actualizarGuiaDinamica(hoy, metas, tot) {
  const comidasHechas = hoy.filter(c => COMIDAS_PRINCIPALES.includes(c.tipo)).map(c => c.tipo);
  const pendientes = COMIDAS_PRINCIPALES.filter(c => !comidasHechas.includes(c.tipo));
  
  const guiaCont = document.getElementById('guiaValores');
  const guiaTit = document.getElementById('guiaTexto');

  if (pendientes.length === 0) {
    guiaTit.innerText = "¡Día completado! Revisa tus totales.";
    guiaCont.innerHTML = "";
    return;
  }

  const proxima = pendientes[0];
  guiaTit.innerText = `Sugerencia para tu ${proxima}`;

  // Cálculo Dinámico: (Meta Total - Todo lo consumido) / Cuántas comidas principales quedan
  const factor = pendientes.length;
  
  let html = "";
  const claves = ['prot', 'carbs', 'grasas', 'kcal', 'fibra', 'agua'];
  
  claves.forEach(k => {
    let sugerido = (metas[k] - tot[k]) / factor;
    if (sugerido < 0) sugerido = 0;
    
    html += `
      <div class="guia-item">
        <span class="guia-lab">${ICONOS[k]} ${k}</span>
        <span class="guia-val">${Math.round(sugerido)}${k === 'agua' ? 'ml' : 'g'}</span>
      </div>
    `;
  });
  guiaCont.innerHTML = html;
}

function verPagina(p, b) {
  document.querySelectorAll('.page').forEach(pg => pg.classList.remove('active-page'));
  document.getElementById('page-'+p).classList.add('active-page');
  document.querySelectorAll('.nav-btn').forEach(btn => btn.classList.remove('active'));
  b.classList.add('active');
}

function guardarMetas() {
  perfiles[usuarioActual].METAS = {
    kcal: +document.getElementById('mKcal').value, prot: +document.getElementById('mProt').value,
    carbs: +document.getElementById('mCarbs').value, grasas: +document.getElementById('mGrasas').value,
    fibra: +document.getElementById('mFibra').value, agua: +document.getElementById('mAgua').value
  };
  guardarYAct();
  alert("Metas actualizadas");
}
</script>
</body>
</html>
